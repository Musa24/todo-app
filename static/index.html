<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Todos</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        margin: 0;
        background: #f6f7f9;
        color: #222;
      }
      .container {
        max-width: 640px;
        margin: 2rem auto;
        padding: 1rem;
      }
      h1 {
        margin-top: 0;
      }
      form {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      form input {
        flex: 1;
        min-width: 0;
        padding: 0.5rem;
        font: inherit;
      }
      form button {
        padding: 0.5rem 1rem;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .task {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem;
        border-bottom: 1px solid #e0e0e0;
      }
      .task-title {
        font-weight: 600;
      }
      .task-description {
        color: #666;
        flex: 1;
      }
      .task.completed .task-title,
      .task.completed .task-description {
        text-decoration: line-through;
        opacity: 0.6;
      }
      button {
        background: #fff;
        border: 1px solid #ccc;
        border-radius: 4px;
        padding: 0.25rem 0.5rem;
        cursor: pointer;
        font: inherit;
      }
      button:hover {
        background: #f0f0f0;
      }
      .empty {
        color: #888;
        padding: 1rem 0;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Todos</h1>
      <form id="create-form">
        <input
          id="title-input"
          name="title"
          placeholder="Title"
          required
          autocomplete="off"
        />
        <input
          id="description-input"
          name="description"
          placeholder="Description (optional)"
          autocomplete="off"
        />
        <button type="submit">Add</button>
      </form>
      <ul id="task-list"></ul>
    </main>
    <script>
      const taskList = document.getElementById('task-list');
      const createForm = document.getElementById('create-form');
      const titleInput = document.getElementById('title-input');
      const descriptionInput = document.getElementById('description-input');

      async function api(path, options = {}) {
        const res = await fetch(path, {
          headers: { 'Content-Type': 'application/json' },
          ...options,
        });
        if (!res.ok) {
          throw new Error(`${res.status} ${res.statusText}`);
        }
        if (res.status === 204) return null;
        return res.json();
      }

      async function loadTasks() {
        try {
          const tasks = await api('/tasks');
          renderTasks(tasks);
        } catch (err) {
          console.error('Failed to load tasks:', err);
        }
      }

      function renderTasks(tasks) {
        taskList.replaceChildren();
        if (tasks.length === 0) {
          const empty = document.createElement('li');
          empty.className = 'empty';
          empty.textContent = 'No tasks yet.';
          taskList.appendChild(empty);
          return;
        }
        for (const task of tasks) {
          taskList.appendChild(buildTaskItem(task));
        }
      }

      function buildTaskItem(task) {
        const li = document.createElement('li');
        li.className = task.completed ? 'task completed' : 'task';
        li.dataset.id = task.id;

        const toggle = document.createElement('input');
        toggle.type = 'checkbox';
        toggle.className = 'task-toggle';
        toggle.checked = task.completed;
        toggle.addEventListener('change', () => toggleComplete(task, toggle));

        const title = document.createElement('span');
        title.className = 'task-title';
        title.textContent = task.title;

        const description = document.createElement('span');
        description.className = 'task-description';
        description.textContent = task.description ?? '';

        const editBtn = document.createElement('button');
        editBtn.className = 'task-edit';
        editBtn.textContent = 'Edit';
        editBtn.addEventListener('click', () => enterEditMode(task, li));

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'task-delete';
        deleteBtn.textContent = 'Delete';
        deleteBtn.addEventListener('click', () => deleteTask(task));

        li.append(toggle, title, description, editBtn, deleteBtn);
        return li;
      }

      async function toggleComplete(task, toggle) {
        try {
          await api(`/tasks/${task.id}`, {
            method: 'PUT',
            body: JSON.stringify({ completed: toggle.checked }),
          });
          await loadTasks();
        } catch (err) {
          console.error('Failed to toggle task:', err);
          toggle.checked = task.completed;
        }
      }

      function enterEditMode(task, li) {
        li.replaceChildren();

        const titleField = document.createElement('input');
        titleField.value = task.title;
        titleField.required = true;

        const descriptionField = document.createElement('input');
        descriptionField.value = task.description ?? '';

        const saveBtn = document.createElement('button');
        saveBtn.textContent = 'Save';
        saveBtn.addEventListener('click', async () => {
          const newTitle = titleField.value.trim();
          if (!newTitle) return;
          try {
            await api(`/tasks/${task.id}`, {
              method: 'PUT',
              body: JSON.stringify({
                title: newTitle,
                description: descriptionField.value,
              }),
            });
            await loadTasks();
          } catch (err) {
            console.error('Failed to save task:', err);
          }
        });

        const cancelBtn = document.createElement('button');
        cancelBtn.textContent = 'Cancel';
        cancelBtn.addEventListener('click', () => loadTasks());

        li.append(titleField, descriptionField, saveBtn, cancelBtn);
        titleField.focus();
      }

      async function deleteTask(task) {
        try {
          await api(`/tasks/${task.id}`, { method: 'DELETE' });
          await loadTasks();
        } catch (err) {
          console.error('Failed to delete task:', err);
        }
      }

      createForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        const title = titleInput.value.trim();
        if (!title) return;
        const description = descriptionInput.value;
        try {
          await api('/tasks', {
            method: 'POST',
            body: JSON.stringify({ title, description }),
          });
          createForm.reset();
          titleInput.focus();
          await loadTasks();
        } catch (err) {
          console.error('Failed to create task:', err);
        }
      });

      loadTasks();
    </script>
  </body>
</html>
